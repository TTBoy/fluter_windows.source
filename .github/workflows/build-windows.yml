name: qa_imageprocess

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Install deps
        run: flutter pub get

      - name: Build
        run: flutter build windows --release

      - name: Check build
        run: dir build/windows/x64/runner/Release

      - name: Zip
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath windows-build.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: windows-build.zip